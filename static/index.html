<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>ts-boy</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="main-container" aria-label="ts-boy Game Boy emulator">
    <div class="device-shell">
      <section class="screen-bezel" aria-label="Game display">
        <div class="screen-meta">
          <span class="screen-line"></span>
          <span>Dot Matrix With Stereo Sound</span>
          <span class="screen-line"></span>
        </div>
        <div class="screen-display">
          <div class="power-indicator">Power</div>
          <div class="lcd-window">
            <canvas id="game-canvas" aria-label="Game Boy display"></canvas>
          </div>
        </div>
      </section>

      <div class="device-brand" aria-label="ts-boy">
        <strong>ts-boy</strong>
        <span>DMG</span>
      </div>

      <section class="options">
        <div class="option-field">
          <label for="rom-select">ROM</label>
          <select id="rom-select"></select>
        </div>

        <div class="option-field">
          <label for="mode-select">Mode</label>
          <select id="mode-select">
            <option value="gb">GB</option>
            <option value="gbc">GBC</option>
          </select>
        </div>

        <div class="checkbox-container">
          <label for="fps-checkbox">Show FPS</label>
          <input type="checkbox" id="fps-checkbox" />
          <span id="fps-text"></span>
        </div>

        <label for="rom-file-input" class="rom-label utility-button" tabindex="0">Upload ROM</label>
        <input type="file" id="rom-file-input" />

        <button id="run-button" class="utility-button">Run</button>
        <button id="pause-button" class="utility-button">Pause</button>
        <button id="download-state-logs-button" class="utility-button">Download State Logs</button>
        <button id="download-operation-logs-button" class="utility-button">Download Operation Logs</button>
      </section>

      <section class="buttons control-deck" aria-label="Game Boy controls">
        <div id="direction-pad">
          <button id="Up-button" type="button" aria-label="Up">
            <span class="visually-hidden">Up</span>
          </button>
          <button id="Left-button" type="button" aria-label="Left">
            <span class="visually-hidden">Left</span>
          </button>
          <button id="Down-button" type="button" aria-label="Down">
            <span class="visually-hidden">Down</span>
          </button>
          <button id="Right-button" type="button" aria-label="Right">
            <span class="visually-hidden">Right</span>
          </button>
        </div>
        <div id="controls">
          <button id="Start-button" type="button">Start</button>
          <button id="Select-button" type="button">Select</button>
        </div>
        <div id="action-pad">
          <button id="A-button" type="button">A</button>
          <button id="B-button" type="button">B</button>
        </div>
      </section>

      <div class="speaker-grille" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </main>

  <script src="web/ts-boy-web.js" type="module"></script>
</body>

</html>
